<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NotFlix</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: url('https://img.pikbest.com/wp/202405/popcorn-movies-movie-night-essentials-cup-and-3d-glasses-on-a-sleek-black-background-with-ample-space_9859108.jpg!w700wp');
            background-size: cover;
            background-color: #121212;
            color: #ffffff;
        }
        .container {
            display:contents;
            max-width: auto;
            text-align: center;
        }
        img {
            max-width: 100%;
            height: auto;
        }
        h1 {
            margin-top: 20px;
            font-size: 2.5em;
            text-align: center;
        }
        p {
            font-size: 1.2em;
            margin-top: 10px;
            text-align: center;
        }

        .btn-lg {
            background-color: #8c0505 !important;
            color: #0a0101fa !important;
            font-weight: bold !important;
            margin-top: 1%;
            margin-bottom: 1%;
        }

        .btn-lg:hover {
            background-color: #861b1b7e !important;
            
        }
    </style>
</head>

<body>
    {% extends 'base.html' %}
    {% load static %}

    {% block content %}
    <div class="container col-md-6">
        <div class="col-md-6">
            <img src="{% static 'logo.jpg' %}" alt="NotFlix Logo">
        </div>
        <div class="col-md-6">
            <h1>Bienvenidos a NotFlix</h1>
            <p>Hoy me quedo en casa. Hoy sale NotFlix</p>
        </div>
        {% if not user.is_authenticated %}
        <div class="text-center">
            <a href="{% url 'signup' %}" class="btn btn-lg" >
                Registrarse
            </a>
            <a href="{% url 'login' %}" class="btn btn-lg">
                Iniciar Sesión
            </a>
        </div>
        {% endif %}
    </div>
    {% endblock %}
</body>
</html>
